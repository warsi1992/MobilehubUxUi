<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">

  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand fw-bold fs-4 d-flex align-items-center"
       routerLink="/">
      <i class="bi bi-phone me-2 text-warning"></i>
      Sonu Mobile
    </a>

    <!-- Mobile Toggle -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbar">

      <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse" id="navbar">

      <!-- Search -->
      <form class="d-flex mx-auto search-box">

        <div class="input-group">

          <span class="input-group-text bg-white border-end-0">
            <i class="bi bi-search"></i>
          </span>

          <input
            class="form-control border-start-0"
            placeholder="Search mobiles, chargers, headphones...">

        </div>

      </form>

      <!-- Right Menu -->
      <ul class="navbar-nav align-items-center ms-auto">

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/products"
            routerLinkActive="active-link">
            Products
          </a>
        </li>

        <li
          class="nav-item"
          *ngIf="authService.isLoggedIn()">

          <a
            class="nav-link position-relative"
            routerLink="/cart">

            <i class="bi bi-cart3 fs-5"></i>

            <span class="ms-1">Cart</span>

            <span
              *ngIf="cartCount>0"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

              {{ cartCount > 99 ? '99+' : cartCount }}

            </span>

          </a>

        </li>

        <!-- Guest -->

        <ng-container *ngIf="!authService.isLoggedIn(); else loggedUser">

          <li class="nav-item ms-3">

            <a
              class="btn btn-outline-light"
              routerLink="/login">

              Login

            </a>

          </li>

          <li class="nav-item ms-2">

            <a
              class="btn btn-warning"
              routerLink="/register">

              Register

            </a>

          </li>

        </ng-container>

        <!-- Logged User -->

        <ng-template #loggedUser>

          <li class="nav-item dropdown ms-3">

            <a
              class="nav-link dropdown-toggle"
              href="#"
              role="button"
              data-bs-toggle="dropdown">

              <i class="bi bi-person-circle me-1"></i>

              {{ firstName }}

            </a>

            <ul class="dropdown-menu dropdown-menu-end">

              <li>

                <a
                  class="dropdown-item"
                  routerLink="/profile">

                  My Profile

                </a>

              </li>

              <li>

                <a
                  class="dropdown-item"
                  routerLink="/orders">

                  My Orders

                </a>

              </li>

              <li><hr class="dropdown-divider"></li>

              <li>

                <button
                  class="dropdown-item text-danger"
                  (click)="logout()">

                  Logout

                </button>

              </li>

            </ul>

          </li>

        </ng-template>

      </ul>

    </div>

  </div>

</nav>
