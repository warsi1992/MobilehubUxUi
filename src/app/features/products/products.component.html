<div class="container py-5">

    <h2 class="mb-4 fw-bold">
        Products
    </h2>

    <div class="row">

        <div
            class="col-lg-3 col-md-4 col-sm-6 mb-4"
            *ngFor="let product of products">

            <div
                class="card h-100 shadow-sm border-0 product-card"
                [routerLink]="['/products', product.id]"
                style="cursor:pointer;">

                <img
                    [src]="'https://mobilehub-production-cfae.up.railway.app' + product.imageUrl"
                    class="card-img-top"
                    style="height:250px;object-fit:contain;padding:15px;">

                <div class="card-body d-flex flex-column">

                    <h5 class="card-title">
                        {{product.name}}
                    </h5>

                    <p class="text-muted small flex-grow-1">
                        {{product.description}}
                    </p>

                    <div>

                        <span class="fs-4 fw-bold text-success">
                            ₹{{product.discountPrice}}
                        </span>

                        <span
                            class="text-danger text-decoration-line-through ms-2">

                            ₹{{product.price}}

                        </span>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
