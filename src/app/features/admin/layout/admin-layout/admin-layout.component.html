<div class="admin-container">

  <!-- Sidebar -->
  <app-admin-sidebar
    class="sidebar"
    [class.open]="isSidebarOpen">
  </app-admin-sidebar>

  <!-- Overlay for Mobile -->
  <div
    class="sidebar-overlay"
    *ngIf="isSidebarOpen"
    (click)="toggleSidebar()">
  </div>

  <!-- Main Content -->
  <div class="admin-content">

    <!-- Header -->
    <app-admin-header
      (menuClick)="toggleSidebar()">
    </app-admin-header>

    <div class="content-body p-3 p-md-4">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
