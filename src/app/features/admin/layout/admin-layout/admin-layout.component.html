<div class="admin-container">

  <app-admin-sidebar
    [isOpen]="isSidebarOpen">
  </app-admin-sidebar>

  <div
    class="sidebar-overlay"
    *ngIf="isSidebarOpen"
    (click)="toggleSidebar()">
  </div>

  <div class="admin-content">

    <app-admin-header
      (menuClick)="toggleSidebar()">
    </app-admin-header>

    <div class="content-body p-3 p-md-4">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
