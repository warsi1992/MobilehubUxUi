<div class="container py-5">

    <h2 class="mb-4">
        Checkout
    </h2>

    <div class="row">

        <div class="col-lg-7">

            <div class="card shadow-sm">

                <div class="card-header fw-bold">

                    Shipping Address

                </div>

                <div class="card-body">

                    <form [formGroup]="checkoutForm">

                        <div class="mb-3">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input
                                class="form-control"
                                formControlName="fullName">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Phone

                            </label>

                            <input
                                class="form-control"
                                formControlName="phone">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Address

                            </label>

                            <textarea
                                rows="3"
                                class="form-control"
                                formControlName="address"></textarea>

                        </div>

                        <div class="row">

                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label class="form-label">

                                        City

                                    </label>

                                    <input
                                        class="form-control"
                                        formControlName="city">

                                </div>

                            </div>

                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label class="form-label">

                                        State

                                    </label>

                                    <input
                                        class="form-control"
                                        formControlName="state">

                                </div>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Pincode

                            </label>

                            <input
                                class="form-control"
                                formControlName="pincode">

                        </div>

                    </form>

                </div>

            </div>

        </div>

        <div class="col-lg-5">

            <div class="card shadow-sm sticky-top">

                <div class="card-header fw-bold">

                    Order Summary

                </div>

                <div class="card-body">

                    <div
                        *ngFor="let item of cartItems"
                        class="d-flex justify-content-between mb-3">

                        <div>

                            <strong>

                                {{item.productName}}

                            </strong>

                            <br>

                            Qty :
                            {{item.quantity}}

                        </div>

                        <div>

                            ₹ {{item.total}}

                        </div>

                    </div>

                    <hr>

                    <div
                        class="d-flex justify-content-between fs-5">

                        <strong>

                            Grand Total

                        </strong>

                        <strong>

                            ₹ {{grandTotal}}

                        </strong>

                    </div>

                    <button
                        class="btn btn-success btn-lg w-100 mt-4"
                        (click)="placeOrder()">

                        Place Order

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
