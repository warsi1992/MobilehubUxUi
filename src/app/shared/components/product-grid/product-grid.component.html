<div class="container py-5">

    <h2 class="mb-5 text-center fw-bold">
        Featured Products
    </h2>

    <div class="row justify-content-center">

        <div
            class="col-xl-3 col-lg-4 col-md-6 col-sm-6 mb-4"
            *ngFor="let product of products">

            <app-product-card
                [product]="product">
            </app-product-card>

        </div>

    </div>

</div>
